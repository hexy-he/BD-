<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BD 地图</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  --color-text-primary: #111827;
  --color-text-secondary: #4B5563;
  --color-text-tertiary: #9CA3AF;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F9FAFB;
  --color-border-primary: #D1D5DB;
  --color-border-secondary: #E5E7EB;
  --color-border-tertiary: #F3F4F6;
  --accent: #378ADD;
  --accent-bg: #E6F1FB;
  --accent-dark: #0C447C;
  --danger: #E24B4A;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#F3F4F6;font-family:var(--font-sans);color:var(--color-text-primary)}

.page-wrap{max-width:780px;margin:0 auto;padding:32px 20px 60px}
.page-header{margin-bottom:24px}
.page-title{font-size:20px;font-weight:600;color:var(--color-text-primary);letter-spacing:-.01em}
.page-sub{font-size:13px;color:var(--color-text-tertiary);margin-top:4px}

.card{background:var(--color-background-primary);border-radius:14px;border:1px solid var(--color-border-secondary);box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:visible}

.tab-bar{display:flex;border-bottom:1px solid var(--color-border-tertiary);padding:0 4px}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--color-text-tertiary);border-bottom:2px solid transparent;transition:all .15s;font-family:var(--font-sans);font-weight:500}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--color-text-secondary)}
.view{display:none}.view.active{display:block}

/* ── Map view ── */
.wrap{display:flex;gap:0;min-height:480px;padding:20px}
.col-left{width:180px;flex-shrink:0;padding-right:16px;display:flex;flex-direction:column;gap:12px}
.col-mid{flex:1;position:relative;display:flex;flex-direction:column;justify-content:space-around;padding:0 8px}
.col-canvas{position:absolute;inset:0;pointer-events:none}
.col-canvas svg{width:100%;height:100%}
.slabel{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
select,input[type=text]{width:100%;padding:7px 10px;border:1px solid var(--color-border-primary);border-radius:8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);transition:border-color .15s,box-shadow .15s}
select:focus,input[type=text]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.divider{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-tertiary)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--color-border-tertiary)}
.mcount{font-size:11px;color:var(--color-text-tertiary);min-height:16px;text-align:right}
.channel-row{position:relative;display:flex;align-items:center;margin:5px 0}
.dot-l{width:5px;height:5px;border-radius:50%;background:var(--color-border-primary);flex-shrink:0;margin-right:8px;transition:background .15s}
.channel-row.active .dot-l{background:var(--accent)}
.cpill{font-size:13px;padding:6px 12px;border:1px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-secondary);position:relative;transition:all .15s;cursor:default;white-space:nowrap}
.channel-row.active .cpill{border-color:var(--accent);color:var(--accent-dark);background:var(--accent-bg);font-weight:500}
.dot-r{width:5px;height:5px;border-radius:50%;background:var(--color-border-primary);flex-shrink:0;margin-left:8px;transition:background .15s}
.channel-row.active .dot-r{background:var(--accent)}
.tip{display:none;position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--color-text-secondary);line-height:1.6;width:200px;z-index:20;box-shadow:0 4px 12px rgba(0,0,0,.10)}
.cpill:hover .tip{display:block}

/* ── Mgmt view ── */
.mgmt-wrap{padding:20px}
.mgmt-form{background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);border-radius:10px;padding:16px;margin-bottom:16px}
.form-title{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:12px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px}
.fg input,.fg textarea{width:100%;padding:7px 10px;border:1px solid var(--color-border-primary);border-radius:8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);transition:border-color .15s,box-shadow .15s}
.fg textarea{resize:vertical;min-height:64px;line-height:1.5}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.fg .hint{font-size:11px;color:var(--color-text-tertiary);margin-top:3px}
.row-actions{display:flex;gap:8px;margin-top:4px}
.btn-p{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:background .15s}
.btn-p:hover{background:#2b6fb5}
.btn-g{padding:7px 13px;background:none;border:1px solid var(--color-border-primary);color:var(--color-text-secondary);border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.btn-g:hover{background:var(--color-background-secondary)}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-size:13px;font-weight:600;color:var(--color-text-primary)}
.badge{font-size:11px;padding:2px 9px;background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);border-radius:99px;color:var(--color-text-secondary)}
.mitem{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--color-border-secondary);border-radius:9px;margin-bottom:7px;background:var(--color-background-primary);transition:box-shadow .15s}
.mitem:hover{box-shadow:0 1px 4px rgba(0,0,0,.07)}
.mitem-info{flex:1;min-width:0}
.mitem-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.mitem-res{font-size:11px;color:var(--color-text-secondary);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mitem-btns{display:flex;gap:5px;flex-shrink:0;align-items:center}
.btn-sm{padding:3px 10px;font-size:11px;border:1px solid var(--color-border-secondary);border-radius:6px;background:none;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.btn-sm:hover{border-color:var(--danger);color:var(--danger)}
.btn-sm.edit:hover{border-color:var(--accent);color:var(--accent)}

/* ── Tag Picker ── */
.tag-field{position:relative}
.tag-box{
  min-height:38px;padding:4px 8px;
  border:1px solid var(--color-border-primary);border-radius:8px;
  background:var(--color-background-primary);
  display:flex;flex-wrap:wrap;gap:4px;align-items:center;
  cursor:text;transition:border-color .15s,box-shadow .15s;
}
.tag-box.open{border-color:var(--accent);box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.tag-chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 6px 2px 8px;
  background:var(--accent-bg);border:1px solid rgba(55,138,221,.3);
  border-radius:5px;font-size:12px;color:var(--accent-dark);font-weight:500;
  white-space:nowrap;
}
.tag-chip-x{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;border-radius:3px;
  cursor:pointer;font-size:13px;line-height:1;color:var(--accent);opacity:.6;
  transition:opacity .1s,background .1s;
}
.tag-chip-x:hover{opacity:1;background:rgba(55,138,221,.15)}
.tag-inline-input{
  border:none;outline:none;font-size:13px;font-family:var(--font-sans);
  color:var(--color-text-primary);background:transparent;
  min-width:90px;flex:1;padding:2px 2px;
}
.tag-inline-input::placeholder{color:var(--color-text-tertiary)}

.tag-dropdown{
  display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;
  background:var(--color-background-primary);
  border:1px solid var(--color-border-secondary);border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:200;
  max-height:230px;overflow-y:auto;padding:4px;
}
.tag-dropdown.open{display:block}
.tag-opt{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:7px;cursor:pointer;
  font-size:13px;color:var(--color-text-primary);
  transition:background .1s;user-select:none;
}
.tag-opt:hover{background:var(--color-background-secondary)}
.tag-opt.is-selected{color:var(--accent);font-weight:500}
.tag-opt-check{width:14px;font-size:12px;flex-shrink:0;color:var(--accent)}
.tag-opt-name{flex:1}
.tag-opt-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .1s}
.tag-opt:hover .tag-opt-actions{opacity:1}
.tag-icon-btn{
  width:22px;height:22px;border:none;background:none;cursor:pointer;
  border-radius:5px;font-size:12px;
  display:inline-flex;align-items:center;justify-content:center;
  color:var(--color-text-tertiary);transition:all .1s;
}
.tag-icon-btn.rename:hover{background:var(--accent-bg);color:var(--accent)}
.tag-icon-btn.del:hover{background:#FEE2E2;color:var(--danger)}

.tag-edit-row{
  display:flex;align-items:center;gap:5px;padding:4px 6px;
  background:var(--accent-bg);border-radius:7px;margin:1px 0;
}
.tag-edit-input{
  flex:1;padding:4px 8px;border:1px solid var(--accent);
  border-radius:6px;font-size:13px;outline:none;font-family:var(--font-sans);
  background:var(--color-background-primary);color:var(--color-text-primary);
}
.tag-edit-ok{padding:3px 9px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font-sans)}
.tag-edit-cancel{padding:3px 8px;background:none;border:1px solid var(--color-border-primary);border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary)}
.tag-opt-create{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:7px;cursor:pointer;
  font-size:13px;color:var(--accent);transition:background .1s;
}
.tag-opt-create:hover{background:var(--accent-bg)}
.tag-opt-empty{padding:8px;font-size:12px;color:var(--color-text-tertiary);text-align:center}
.tag-section-label{padding:4px 8px 2px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary)}
</style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">BD 地图</div>
    <div class="page-sub">渠道资源可视化 &amp; 数据库管理</div>
  </div>

  <div class="card">
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('map')">BD 地图</button>
      <button class="tab" onclick="switchTab('mgmt')">管理数据库</button>
    </div>

    <div class="view active" id="view-map">
      <div class="wrap">
        <div class="col-left">
          <div>
            <div class="slabel">快速选择</div>
            <select id="preset" onchange="onPreset(this.value)">
              <option value="">— 选择标签 —</option>
            </select>
          </div>
          <div class="divider">或</div>
          <div>
            <div class="slabel">自由搜索</div>
            <input type="text" id="qinput" placeholder="输入关键词…" oninput="onQuery(this.value)"/>
          </div>
          <div class="mcount" id="mcount"></div>
        </div>
        <div class="col-mid" id="col-mid">
          <svg class="col-canvas" id="svglines" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="channels"></div>
        </div>
      </div>
    </div>

    <div class="view" id="view-mgmt">
      <div class="mgmt-wrap">
        <div class="mgmt-form">
          <div class="form-title" id="ftitle">添加新渠道</div>
          <div class="fg">
            <label>渠道名称</label>
            <input type="text" id="f-name" placeholder="例：璞跃"/>
          </div>
          <div class="fg">
            <label>提供的资源</label>
            <div class="tag-field" id="tag-field">
              <div class="tag-box" id="tag-box">
                <input class="tag-inline-input" id="tag-inline-input"
                       placeholder="搜索或新增标签…"
                       autocomplete="off"/>
              </div>
              <div class="tag-dropdown" id="tag-dropdown"></div>
            </div>
          </div>
          <div class="fg">
            <label>我的感知</label>
            <textarea id="f-desc" placeholder="用你自己的话描述这个渠道…"></textarea>
          </div>
          <input type="hidden" id="f-eid" value=""/>
          <div class="row-actions">
            <button class="btn-p" onclick="saveChannel()">保存</button>
            <button class="btn-g" onclick="resetForm()">清空</button>
          </div>
        </div>
        <div class="list-header">
          <span class="list-title">已有渠道</span>
          <span class="badge" id="mgmt-count">0 个</span>
        </div>
        <div id="mgmt-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Seed data ── */
const SEED = [
  {id:1,name:"璞跃",res:["B端资源","90后","市场","用户增长","制造业","API资源","token资源"],desc:"B端资源/90后工作经验（市场、用户增长、制造业、API资源、token资源）"},
  {id:2,name:"科创学院",res:["00后","硬件","创业"],desc:"00后硬件创业者"},
  {id:3,name:"清华信息港",res:["00后","硬件","创业"],desc:"00后硬件创业者"},
  {id:4,name:"Attrax黑客松",res:["00后","硬件","软件","创业"],desc:"00后硬件创业者+软件类选手"},
  {id:5,name:"科创之光",res:["00后","软件","技术","创业"],desc:"00后软硬件技术类学生（有创业想法但还很稚嫩）"},
  {id:6,name:"南科大张英哲",res:["算法","实习"],desc:"算法类同学/实习生招募"},
  {id:7,name:"茶蛋和Frank",res:["北美","市场","用户增长"],desc:"北美品牌/市场/用户增长经验"},
  {id:8,name:"SheNicest",res:["00后","硬件","大厂"],desc:"00后硬件为主，少部分大厂员工（创业性质的不多）"}
];

/* ── Core data ── */
let db = [];
let nid = 1;
let tagList = []; // master list of all resource tags

function load(){
  try{
    const s = localStorage.getItem('bd_v2');
    if(s){ const p=JSON.parse(s); db=p.db; nid=p.nid; }
    else { db=SEED.map(d=>({...d})); nid=9; }
  }catch(e){ db=SEED.map(d=>({...d})); nid=9; }

  try{
    const t = localStorage.getItem('bd_tags');
    if(t){ tagList=JSON.parse(t); return; }
  }catch(e){}
  // Bootstrap tagList from existing channel data
  const set = new Set();
  db.forEach(c=>c.res.forEach(r=>set.add(r)));
  tagList = [...set].sort();
}

function persist(){ try{ localStorage.setItem('bd_v2',JSON.stringify({db,nid})); }catch(e){} }
function persistTags(){ try{ localStorage.setItem('bd_tags',JSON.stringify(tagList)); }catch(e){} }

/* ── Map helpers ── */
let activeIds = new Set();

function matchQ(q){
  if(!q.trim()) return new Set();
  const lq=q.toLowerCase(), s=new Set();
  db.forEach(c=>{
    if(c.name.toLowerCase().includes(lq)||c.res.some(r=>r.toLowerCase().includes(lq))||c.desc.toLowerCase().includes(lq)) s.add(c.id);
  });
  return s;
}

function buildDropdown(){
  const sel=document.getElementById('preset');
  const cur=sel.value;
  sel.innerHTML='<option value="">— 选择标签 —</option>';
  tagList.forEach(t=>{
    const o=document.createElement('option');
    o.value=t; o.textContent=t;
    if(t===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function renderMap(){
  const cont=document.getElementById('channels');
  cont.innerHTML=db.map(c=>`
    <div class="channel-row${activeIds.has(c.id)?' active':''}" id="row-${c.id}">
      <div class="dot-l"></div>
      <div class="cpill">${c.name}<div class="tip">${c.desc||'—'}</div></div>
      <div class="dot-r" id="dr-${c.id}"></div>
    </div>`).join('');
  drawLines();
}

function drawLines(){
  const svg=document.getElementById('svglines');
  const mid=document.getElementById('col-mid');
  const mr=mid.getBoundingClientRect();
  if(!mr.width) return;
  svg.setAttribute('viewBox',`0 0 ${mr.width} ${mr.height}`);
  svg.innerHTML='';
  if(!activeIds.size) return;
  const oy=mr.height/2;
  activeIds.forEach(id=>{
    const dot=document.getElementById('dr-'+id);
    if(!dot) return;
    const dr=dot.getBoundingClientRect();
    const cx=dr.left+dr.width/2-mr.left, cy=dr.top+dr.height/2-mr.top, mx=cx/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M0,${oy} C${mx},${oy} ${mx},${cy} ${cx},${cy}`);
    path.setAttribute('fill','none'); path.setAttribute('stroke','#378ADD');
    path.setAttribute('stroke-width','1.5'); path.setAttribute('opacity','0.5');
    svg.appendChild(path);
  });
}

function setActive(ids){
  activeIds=ids; renderMap();
  document.getElementById('mcount').textContent=ids.size>0?`匹配 ${ids.size} 个渠道`:'';
}
function onPreset(v){ document.getElementById('qinput').value=''; setActive(v?matchQ(v):new Set()); }
function onQuery(v){ document.getElementById('preset').value=''; setActive(v?matchQ(v):new Set()); }

/* ── Tag Picker state ── */
let formTags = [];       // selected tags in current form
let tagSearchVal = '';   // text in the inline input
let editingTagIdx = -1;  // index in tagList being renamed (-1 = none)
let dropdownOpen = false;

/* ── Tag Picker: open / close ── */
function openTagDropdown(){
  dropdownOpen=true;
  document.getElementById('tag-box').classList.add('open');
  document.getElementById('tag-dropdown').classList.add('open');
  renderTagDropdown();
}
function closeTagDropdown(){
  dropdownOpen=false;
  editingTagIdx=-1;
  document.getElementById('tag-box').classList.remove('open');
  document.getElementById('tag-dropdown').classList.remove('open');
}
function focusTagInput(){ document.getElementById('tag-inline-input').focus(); }

/* ── Tag Picker: render chips ── */
function renderTagChips(){
  const box=document.getElementById('tag-box');
  box.querySelectorAll('.tag-chip').forEach(el=>el.remove());
  const input=document.getElementById('tag-inline-input');
  formTags.forEach((tag,i)=>{
    const chip=document.createElement('span');
    chip.className='tag-chip';
    chip.dataset.idx=i;
    chip.innerHTML=`${esc(tag)}<span class="tag-chip-x" data-remove="${i}">×</span>`;
    box.insertBefore(chip,input);
  });
}

/* ── Tag Picker: render dropdown ── */
function renderTagDropdown(){
  const dd=document.getElementById('tag-dropdown');
  const filter=tagSearchVal.trim().toLowerCase();
  const filtered=tagList.filter(t=>!filter||t.toLowerCase().includes(filter));
  const exactMatch=tagList.some(t=>t.toLowerCase()===tagSearchVal.trim().toLowerCase()&&tagSearchVal.trim());

  let html='';

  if(filtered.length){
    html+=`<div class="tag-section-label">标签库</div>`;
    filtered.forEach((tag,fi)=>{
      const realIdx=tagList.indexOf(tag);
      const sel=formTags.includes(tag);
      if(editingTagIdx===realIdx){
        html+=`<div class="tag-edit-row">
          <input class="tag-edit-input" id="tag-edit-input" value="${esc(tag)}" autocomplete="off"/>
          <button class="tag-edit-ok" data-confirm="${realIdx}">✓</button>
          <button class="tag-edit-cancel" data-cancel="1">✕</button>
        </div>`;
      } else {
        html+=`<div class="tag-opt${sel?' is-selected':''}" data-toggle="${realIdx}">
          <span class="tag-opt-check">${sel?'✓':''}</span>
          <span class="tag-opt-name">${esc(tag)}</span>
          <span class="tag-opt-actions">
            <button class="tag-icon-btn rename" data-rename="${realIdx}" title="重命名">✎</button>
            <button class="tag-icon-btn del" data-del="${realIdx}" title="删除">✕</button>
          </span>
        </div>`;
      }
    });
  }

  if(tagSearchVal.trim()&&!exactMatch){
    html+=`<div class="tag-opt-create" data-create="1">+ 新增 &ldquo;${esc(tagSearchVal.trim())}&rdquo;</div>`;
  }
  if(!filtered.length&&!tagSearchVal.trim()){
    html+=`<div class="tag-opt-empty">暂无标签，输入内容新增</div>`;
  }

  dd.innerHTML=html;
  if(editingTagIdx>=0){
    const inp=document.getElementById('tag-edit-input');
    if(inp){ inp.focus(); inp.select(); }
  }
}

/* ── Tag Picker: event delegation on dropdown ── */
document.addEventListener('mousedown',e=>{
  const dd=document.getElementById('tag-dropdown');
  const box=document.getElementById('tag-box');
  if(!dd.contains(e.target)&&!box.contains(e.target)) closeTagDropdown();
});

document.addEventListener('click',e=>{
  // chips × button
  const removeIdx=e.target.dataset.remove;
  if(removeIdx!==undefined){
    formTags.splice(parseInt(removeIdx),1);
    renderTagChips(); renderTagDropdown(); return;
  }
  // dropdown items
  const dd=document.getElementById('tag-dropdown');
  if(!dd.contains(e.target)) return;

  if(e.target.dataset.create!==undefined||e.target.closest('[data-create]')){
    createAndAddTag(); return;
  }
  if(e.target.dataset.cancel!==undefined){
    editingTagIdx=-1; renderTagDropdown(); return;
  }
  const confirmIdx=e.target.dataset.confirm;
  if(confirmIdx!==undefined){ confirmRenameTag(parseInt(confirmIdx)); return; }

  const renameIdx=e.target.dataset.rename;
  if(renameIdx!==undefined){ e.stopPropagation(); startEditTag(parseInt(renameIdx)); return; }

  const delIdx=e.target.dataset.del;
  if(delIdx!==undefined){ e.stopPropagation(); deleteMasterTag(parseInt(delIdx)); return; }

  const toggleIdx=e.target.closest('[data-toggle]');
  if(toggleIdx&&dd.contains(toggleIdx)){ toggleFormTag(parseInt(toggleIdx.dataset.toggle)); return; }
});

/* ── Tag Picker: inline input handlers ── */
function onTagInput(v){
  tagSearchVal=v;
  renderTagDropdown();
}
function onTagKeydown(e){
  if(e.key==='Enter'&&tagSearchVal.trim()){
    e.preventDefault();
    if(tagList.some(t=>t.toLowerCase()===tagSearchVal.trim().toLowerCase())){
      const idx=tagList.findIndex(t=>t.toLowerCase()===tagSearchVal.trim().toLowerCase());
      toggleFormTag(idx);
    } else {
      createAndAddTag();
    }
  }
  if(e.key==='Backspace'&&!tagSearchVal&&formTags.length){
    formTags.pop(); renderTagChips(); renderTagDropdown();
  }
  if(e.key==='Escape') closeTagDropdown();
}

function onTagEditKeydown(e){
  if(e.key==='Enter') confirmRenameTag(editingTagIdx);
  if(e.key==='Escape'){ editingTagIdx=-1; renderTagDropdown(); }
}

/* ── Tag Picker: actions ── */
function toggleFormTag(idx){
  const tag=tagList[idx];
  if(!tag) return;
  const fi=formTags.indexOf(tag);
  if(fi>=0) formTags.splice(fi,1);
  else formTags.push(tag);
  renderTagChips(); renderTagDropdown();
}

function createAndAddTag(){
  const tag=tagSearchVal.trim();
  if(!tag) return;
  if(!tagList.some(t=>t.toLowerCase()===tag.toLowerCase())){
    tagList.push(tag);
    tagList.sort((a,b)=>a.localeCompare(b,'zh'));
    persistTags(); buildDropdown();
  }
  const realTag=tagList.find(t=>t.toLowerCase()===tag.toLowerCase());
  if(realTag&&!formTags.includes(realTag)) formTags.push(realTag);
  tagSearchVal='';
  document.getElementById('tag-inline-input').value='';
  renderTagChips(); renderTagDropdown();
}

function startEditTag(idx){
  editingTagIdx=idx;
  renderTagDropdown();
  // attach keydown to the edit input after render
  const inp=document.getElementById('tag-edit-input');
  if(inp) inp.addEventListener('keydown',onTagEditKeydown);
}

function confirmRenameTag(idx){
  const inp=document.getElementById('tag-edit-input');
  if(!inp) return;
  const newTag=inp.value.trim();
  const oldTag=tagList[idx];
  if(!newTag){ editingTagIdx=-1; renderTagDropdown(); return; }
  if(newTag===oldTag){ editingTagIdx=-1; renderTagDropdown(); return; }
  if(tagList.some((t,i)=>i!==idx&&t.toLowerCase()===newTag.toLowerCase())){
    alert('该标签名已存在'); inp.focus(); return;
  }
  // rename in tagList
  tagList[idx]=newTag;
  tagList.sort((a,b)=>a.localeCompare(b,'zh'));
  // rename in all channels
  db.forEach(c=>{ const i=c.res.indexOf(oldTag); if(i>-1) c.res[i]=newTag; });
  // rename in form selection
  const fi=formTags.indexOf(oldTag);
  if(fi>=0) formTags[fi]=newTag;
  editingTagIdx=-1;
  persistTags(); persist(); buildDropdown(); renderTagChips(); renderTagDropdown();
}

function deleteMasterTag(idx){
  const tag=tagList[idx];
  const usedBy=db.filter(c=>c.res.includes(tag)).map(c=>c.name);
  if(usedBy.length>0){
    if(!confirm(`标签「${tag}」正在被 ${usedBy.join('、')} 使用，确认删除并从这些渠道移除？`)) return;
    db.forEach(c=>{ c.res=c.res.filter(r=>r!==tag); });
    persist();
  }
  tagList.splice(idx,1);
  formTags=formTags.filter(t=>t!==tag);
  persistTags(); buildDropdown(); renderTagChips(); renderTagDropdown();
}

/* ── Mgmt form ── */
function renderMgmt(){
  document.getElementById('mgmt-count').textContent=db.length+' 个';
  const el=document.getElementById('mgmt-list');
  if(!db.length){ el.innerHTML='<div style="font-size:13px;color:#9CA3AF;padding:1rem 0">还没有渠道</div>'; return; }
  el.innerHTML=db.map(c=>`
    <div class="mitem">
      <div class="mitem-info">
        <div class="mitem-name">${esc(c.name)}</div>
        <div class="mitem-res">${c.res.map(esc).join(' · ')}</div>
      </div>
      <div class="mitem-btns">
        <button class="btn-sm edit" onclick="editCh(${c.id})">编辑</button>
        <button class="btn-sm" onclick="delCh(${c.id})">删除</button>
      </div>
    </div>`).join('');
}

function saveChannel(){
  const name=document.getElementById('f-name').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const eid=document.getElementById('f-eid').value;
  if(!name){ alert('请填写渠道名称'); return; }
  const tags=[...formTags];
  // ensure any new tags from the form are in tagList
  tags.forEach(t=>{ if(!tagList.includes(t)){ tagList.push(t); tagList.sort((a,b)=>a.localeCompare(b,'zh')); } });
  if(eid){
    const idx=db.findIndex(c=>c.id==eid);
    if(idx>-1) db[idx]={id:parseInt(eid),name,res:tags,desc};
  } else {
    db.push({id:nid++,name,res:tags,desc});
  }
  persist(); persistTags();
  resetForm(); renderMgmt(); buildDropdown();
}

function editCh(id){
  const c=db.find(d=>d.id===id);
  if(!c) return;
  document.getElementById('f-name').value=c.name;
  document.getElementById('f-desc').value=c.desc;
  document.getElementById('f-eid').value=id;
  document.getElementById('ftitle').textContent='编辑渠道';
  formTags=[...c.res];
  renderTagChips();
  window.scrollTo({top:0,behavior:'smooth'});
}

function delCh(id){
  if(!confirm('确认删除？')) return;
  db=db.filter(d=>d.id!==id);
  persist(); renderMgmt(); buildDropdown();
}

function resetForm(){
  document.getElementById('f-name').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-eid').value='';
  document.getElementById('ftitle').textContent='添加新渠道';
  formTags=[]; tagSearchVal=''; editingTagIdx=-1;
  document.getElementById('tag-inline-input').value='';
  renderTagChips(); closeTagDropdown();
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['map','mgmt'][i]===t));
  document.querySelectorAll('.view').forEach((el,i)=>el.classList.toggle('active',['map','mgmt'][i]===t));
  if(t==='mgmt') renderMgmt();
  if(t==='map') setTimeout(drawLines,50);
}

/* ── Tag inline input wire-up (after DOM ready) ── */
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('tag-inline-input');
  inp.addEventListener('focus',openTagDropdown);
  inp.addEventListener('input',e=>onTagInput(e.target.value));
  inp.addEventListener('keydown',onTagKeydown);
  document.getElementById('tag-box').addEventListener('click',focusTagInput);
});

/* ── Helpers ── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Init ── */
load();
buildDropdown();
renderMap();
window.addEventListener('resize',drawLines);
</script>
</body>
</html>
